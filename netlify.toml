[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "VITE_YOUTUBE_CHANNEL_ID,VITE_YOUTUBE_API_KEY,VITE_SOCKET_URL,VITE_YOUTUBE_HANDLE,IGDB_CLIENT_ID,IGDB_CLIENT_SECRET,TWITCH_CLIENT_ID,TWITCH_CLIENT_SECRET"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
